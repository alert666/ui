services:
  nginx:
    image: registry.cn-beijing.aliyuncs.com/qqlx/alertmanagerui:refactor-alert-2689264-20260616-170622
    container_name: nginx-otel
    environment:
      - TZ=Asia/Shanghai
    cap_add:
      - SYS_NICE
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:ro
      - ./nginx/cert/:/etc/nginx/cert:ro
  apiserver:
    image: registry.cn-beijing.aliyuncs.com/qqlx/alertmanager:refactor-alert-01d4f93-20260616-091940
    restart: always
    container_name: apiserver
    environment:
      - SERVICE_NAME=api-server
      - API_SERVER_SERVER_BIND=:8080
      - API_SERVER_CONFIG_PATH=/app/config.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://10.10.10.10:30001
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=api-server
      # - OTEL_METRICS_EXPORTER=prometheus
      # - OTEL_EXPORTER_PROMETHEUS_PORT=9464
      # - OTEL_EXPORTER_PROMETHEUS_HOST=0.0.0.0
    ports:
      - 8080:8080
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./certs:/app/certs
  redis:
    image: registry.cn-beijing.aliyuncs.com/middleware1995/redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --requirepass password
      --appendonly yes
      --save 86400 1
  mysql:
    image: mysql:8.0
    container_name: mysql_optimized
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: alert_manager
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --performance_schema=OFF
      - --innodb_buffer_pool_size=64M
      - --innodb_log_buffer_size=1M
      - --innodb_flush_log_at_trx_commit=2
      - --max_connections=20
      - --key_buffer_size=8M
      - --tmp_table_size=16M
      - --max_heap_table_size=16M
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
volumes:
  redis-data:
  mysql_data:
    driver: local
